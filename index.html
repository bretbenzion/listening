<style>
/* ============================================================
   Programme Notes — simple, functional styling
   Tokens:
     --bg          #FFFFFF   page background
     --bg-subtle   #F6F6F7   panels, rows on hover
     --border      #E1E1E4   hairlines
     --text        #1B1B1E   primary text
     --text-muted  #6B6B72   secondary text
     --accent      #2F5D8A   links, primary actions, focus
     --accent-soft #EAF1F7   selected row background
     --star        #E3A008   filled star
     --star-empty  #D8D8DC   empty star outline
     --danger      #B3261E   delete / destructive
   Font: system UI stack throughout (no external font loading).
   ============================================================ */

:root {
  --bg: #FFFFFF;
  --bg-subtle: #F6F6F7;
  --bg-subtle-2: #EFEFF1;
  --border: #E1E1E4;
  --text: #1B1B1E;
  --text-muted: #6B6B72;
  --accent: #2F5D8A;
  --accent-hover: #274E73;
  --accent-soft: #EAF1F7;
  --star: #E3A008;
  --star-empty: #D8D8DC;
  --danger: #B3261E;
  --danger-soft: #FBEAE9;
  --radius: 6px;
  --focus-ring: 0 0 0 3px rgba(47, 93, 138, 0.35);
}

* { box-sizing: border-box; }
html, body { height: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button, input, textarea { font-family: inherit; color: inherit; }
a { color: var(--accent); }

button:focus-visible,
input:focus-visible,
textarea:focus-visible,
[tabindex]:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: 4px;
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* ---------- App shell ---------- */
#app { height: 100dvh; display: flex; flex-direction: column; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand { display: flex; flex-direction: column; min-width: 0; }
.brand-title { font-size: 1.15rem; font-weight: 700; white-space: nowrap; }
.brand-title small {
  display: block;
  font-weight: 400;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 1px;
}

.topbar-actions { display: flex; gap: 8px; flex-shrink: 0; }

.btn {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  padding: 8px 13px;
  border-radius: var(--radius);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 100ms ease, border-color 100ms ease;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-subtle); border-color: #CACACE; }
.btn:active { background: var(--bg-subtle-2); }

.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

.btn-ghost { background: transparent; }
.btn-danger { color: var(--danger); border-color: var(--danger-soft); background: transparent; }
.btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
.btn-sm { padding: 6px 10px; font-size: 0.78rem; }

/* ---------- Layout ---------- */
.layout { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }

.sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }

.search-wrap { padding: 12px 14px 8px; }
.search-input {
  width: 100%;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 11px;
  font-size: 0.85rem;
}
.search-input::placeholder { color: var(--text-muted); }

.tree { flex: 1; overflow-y: auto; padding: 4px 8px 24px; }

.tree-empty { margin: 32px 16px; text-align: center; color: var(--text-muted); font-size: 0.88rem; line-height: 1.6; }

.composer-group { margin-bottom: 2px; }
.composer-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 8px; cursor: pointer; border-radius: var(--radius); user-select: none;
}
.composer-header:hover { background: var(--bg-subtle); }
.disclosure { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-muted); transition: transform 120ms ease; }
.composer-group.collapsed .disclosure { transform: rotate(-90deg); }
.composer-name { font-weight: 600; font-size: 0.9rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.composer-count { font-size: 0.72rem; color: var(--text-muted); }

.piece-list { padding-left: 18px; }
.composer-group.collapsed .piece-list { display: none; }
.piece-group { margin: 1px 0; }
.piece-header { display: flex; align-items: center; gap: 8px; padding: 6px 8px; cursor: pointer; border-radius: var(--radius); color: var(--text-muted); }
.piece-header:hover { background: var(--bg-subtle); color: var(--text); }
.piece-title { font-size: 0.85rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.entry-list { padding-left: 16px; }
.piece-group.collapsed .entry-list { display: none; }
.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius); cursor: pointer;
  font-size: 0.8rem; color: var(--text-muted); border-left: 2px solid transparent;
}
.entry-row:hover { background: var(--bg-subtle); color: var(--text); }
.entry-row.active { background: var(--accent-soft); color: var(--text); border-left-color: var(--accent); }
.entry-row .mvt-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ---------- Star rating ---------- */
.stars { display: inline-flex; align-items: center; gap: 2px; flex-shrink: 0; }
.stars.small svg { width: 13px; height: 13px; }
.stars svg { width: 16px; height: 16px; }
.star-filled { fill: var(--star); stroke: var(--star); }
.star-empty { fill: none; stroke: var(--star-empty); }

.rating-picker { display: inline-flex; gap: 3px; }
.rating-picker button {
  border: none; background: none; padding: 3px; cursor: pointer; line-height: 0;
}
.rating-picker svg { width: 26px; height: 26px; }

/* ---------- Detail pane ---------- */
.detail { min-height: 0; overflow-y: auto; padding: 28px 36px 60px; }

.detail-empty {
  height: 100%; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; color: var(--text-muted); text-align: center; padding: 0 20px;
}
.detail-empty h2 { color: var(--text); font-size: 1.2rem; margin: 0; }
.detail-empty p { max-width: 360px; line-height: 1.6; font-size: 0.9rem; margin: 0; }

.entry-eyebrow { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; }

.entry-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.entry-work { font-size: 1.5rem; font-weight: 700; line-height: 1.3; margin: 0; }
.entry-movement { font-size: 1rem; color: var(--text-muted); margin: 6px 0 0; }

.entry-actions { display: flex; gap: 8px; }

.entry-meta-row { display: flex; align-items: center; gap: 16px; margin: 16px 0 4px; flex-wrap: wrap; }

.entry-sub {
  margin-top: 14px;
  font-size: 0.88rem;
  color: var(--text-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
}
.entry-sub strong { color: var(--text); font-weight: 600; }
.entry-sub a { text-decoration: none; }
.entry-sub a:hover { text-decoration: underline; }

.divider { height: 1px; background: var(--border); margin: 20px 0 24px; }

.entry-notes { font-size: 0.98rem; line-height: 1.7; white-space: pre-wrap; max-width: 68ch; }
.entry-notes:empty::before { content: "No thoughts written down yet."; color: var(--text-muted); font-style: italic; }

.siblings-section { margin-top: 32px; }
.siblings-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; }
.siblings-pills { display: flex; flex-wrap: wrap; gap: 8px; }

/* ---------- Form ---------- */
.form-grid { display: grid; gap: 16px; max-width: 620px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
.field input[type="text"], .field input[type="url"], .field textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 11px;
  font-size: 0.92rem;
  width: 100%;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field input::placeholder, .field textarea::placeholder { color: #A6A6AB; }
.field textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
.field-row { display: flex; gap: 14px; }
.field-row .field { flex: 1; }
.field-hint { font-size: 0.78rem; color: var(--text-muted); }

.form-actions { display: flex; gap: 10px; margin-top: 4px; }

/* ---------- Modal ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(20, 20, 22, 0.5);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto; z-index: 50;
}
.modal {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  width: 100%; max-width: 660px; padding: 24px 28px 28px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.18);
}
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.modal-title { font-size: 1.1rem; font-weight: 700; margin: 0; }
.modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--text); }

.modal-sm { max-width: 440px; }
.modal-sm p { line-height: 1.6; color: var(--text-muted); font-size: 0.9rem; }
.modal-choice-row { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.modal-choice { border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius); padding: 12px 15px; text-align: left; cursor: pointer; }
.modal-choice:hover { border-color: #CACACE; background: var(--bg-subtle); }
.modal-choice strong { display: block; font-size: 0.9rem; margin-bottom: 3px; }
.modal-choice span { font-size: 0.78rem; color: var(--text-muted); }

.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 10px 18px; border-radius: var(--radius);
  font-size: 0.85rem; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

/* ---------- Mobile ---------- */
.back-btn { display: none; }

@media (max-width: 820px) {
  .topbar { padding: 12px 14px; }
  .btn-label { display: none; }
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: none; }
  .detail { padding: 18px 16px 60px; }
  .layout.showing-detail .sidebar { display: none; }
  .layout:not(.showing-detail) .detail { display: none; }
  .back-btn { display: inline-flex; margin-bottom: 16px; }
  .modal { padding: 20px 16px 24px; }
  .entry-work { font-size: 1.3rem; }
}

</style>
</head>
<body>

<div id="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-title">Programme Notes<small>a listening journal</small></div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost" id="btn-import" title="Import a JSON backup">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="btn-label">Import</span>
      </button>
      <button class="btn btn-ghost" id="btn-export" title="Export a JSON backup">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 0l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="btn-label">Export</span>
      </button>
      <button class="btn btn-primary" id="btn-add" title="Add a new listening entry">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        <span class="btn-label">Add entry</span>
      </button>
    </div>
    <input type="file" id="file-import" accept="application/json,.json" class="visually-hidden" />
  </header>

  <div class="layout" id="layout">

    <aside class="sidebar">
      <div class="search-wrap">
        <input type="text" id="search" class="search-input" placeholder="Search composers, works, movements…" />
      </div>
      <nav class="tree" id="tree" aria-label="Your library"></nav>
    </aside>

    <main class="detail" id="detail"></main>

  </div>
</div>

<!-- Add / edit entry modal -->
<div class="modal-backdrop visually-hidden" id="entry-modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="entry-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="entry-modal-title">New listening entry</h2>
      <button class="modal-close" id="entry-modal-close" aria-label="Close">&times;</button>
    </div>

    <form id="entry-form" class="form-grid">
      <input type="hidden" id="entry-id" />

      <div class="field-row">
        <div class="field">
          <label for="entry-composer">Composer</label>
          <input type="text" id="entry-composer" list="composer-list" placeholder="e.g. Dmitri Shostakovich" required />
          <datalist id="composer-list"></datalist>
        </div>
        <div class="field">
          <label for="entry-work">Piece</label>
          <input type="text" id="entry-work" list="work-list" placeholder="e.g. String Quartet No. 8" required />
          <datalist id="work-list"></datalist>
        </div>
      </div>

      <div class="field">
        <label for="entry-movement">Movement <span style="font-weight:400;">(optional)</span></label>
        <input type="text" id="entry-movement" placeholder="e.g. II. Allegro molto — leave blank for a whole-work note" />
        <div class="field-hint">Add one entry per movement if you're listening movement by movement, or leave this blank for a note on the piece as a whole.</div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="entry-conductor">Conductor / performers <span style="font-weight:400;">(optional)</span></label>
          <input type="text" id="entry-conductor" placeholder="e.g. Carlos Kleiber, Vienna Philharmonic" />
        </div>
        <div class="field">
          <label for="entry-recording">Recording link <span style="font-weight:400;">(optional)</span></label>
          <input type="url" id="entry-recording" placeholder="https://…" />
        </div>
      </div>

      <div class="field">
        <label>Rating</label>
        <div class="rating-picker" id="rating-picker"></div>
      </div>

      <div class="field">
        <label for="entry-notes">Your impressions</label>
        <textarea id="entry-notes" placeholder="What did you notice? How did it feel? What stood out on this listen?"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save entry</button>
        <button type="button" class="btn btn-ghost" id="entry-cancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="entry-delete" style="margin-left:auto;display:none;">Delete entry</button>
      </div>
    </form>
  </div>
</div>

<!-- Import choice modal -->
<div class="modal-backdrop visually-hidden" id="import-modal-backdrop">
  <div class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="import-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="import-modal-title">Import backup</h2>
      <button class="modal-close" id="import-modal-close" aria-label="Close">&times;</button>
    </div>
    <p id="import-summary">A backup file is ready to import.</p>
    <div class="modal-choice-row">
      <button class="modal-choice" id="import-merge">
        <strong>Merge with current library</strong>
        <span>Adds entries from the file. Entries with the same ID overwrite existing ones.</span>
      </button>
      <button class="modal-choice" id="import-replace">
        <strong>Replace current library</strong>
        <span>Erases everything currently stored here and loads the file instead.</span>
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast visually-hidden"></div>

<script>
(() => {
  "use strict";

  /* ---------------------------------------------------------------
     Constants & tiny helpers
  --------------------------------------------------------------- */
  const STORAGE_KEY = "programmeNotes:v1";
  const SVGNS = "http://www.w3.org/2000/svg";
  const STAR_PATH = "M12 2.5l2.9 6.13 6.6.79-4.9 4.6 1.28 6.68L12 17.7l-5.88 3 1.28-6.68-4.9-4.6 6.6-.79z";

  const $ = (sel, root = document) => root.querySelector(sel);

  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
  }

  function isUrl(str) {
    return /^https?:\/\/\S+$/i.test((str || "").trim());
  }

  /* ---------------------------------------------------------------
     Persistence
  --------------------------------------------------------------- */
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { entries: [] };
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.entries)) return { entries: [] };
      return parsed;
    } catch (err) {
      console.error("Could not read stored data:", err);
      return { entries: [] };
    }
  }

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    } catch (err) {
      console.error("Could not save data:", err);
      showToast("Couldn't save — your browser storage may be full.");
    }
  }

  let DATA = loadData();
  let selectedEntryId = null;
  let pendingImportEntries = null;
  const collapsedComposers = new Set();
  const collapsedPieces = new Set();

  /* ---------------------------------------------------------------
     Star rating
  --------------------------------------------------------------- */
  function starIcon(filled) {
    const svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("class", filled ? "star-filled" : "star-empty");
    const path = document.createElementNS(SVGNS, "path");
    path.setAttribute("d", STAR_PATH);
    path.setAttribute("stroke-width", "1.5");
    path.setAttribute("stroke-linejoin", "round");
    svg.appendChild(path);
    return svg;
  }

  function starRow(value, small = true) {
    const wrap = document.createElement("span");
    wrap.className = "stars" + (small ? " small" : "");
    for (let i = 1; i <= 5; i++) {
      wrap.appendChild(starIcon(i <= value));
    }
    return wrap;
  }

  /* ---------------------------------------------------------------
     Grouping: Composer -> Piece -> Entries (movements / whole-work)
  --------------------------------------------------------------- */
  function matchesQuery(entry, query) {
    if (!query) return true;
    const q = query.toLowerCase();
    return (
      entry.composer.toLowerCase().includes(q) ||
      entry.work.toLowerCase().includes(q) ||
      (entry.movement || "").toLowerCase().includes(q) ||
      (entry.conductor || "").toLowerCase().includes(q) ||
      (entry.notes || "").toLowerCase().includes(q)
    );
  }

  function buildGroups(query) {
    const composerMap = new Map();

    for (const entry of DATA.entries) {
      if (!matchesQuery(entry, query)) continue;
      const cKey = entry.composer.trim().toLowerCase();
      if (!composerMap.has(cKey)) {
        composerMap.set(cKey, { display: entry.composer.trim(), pieceMap: new Map() });
      }
      const cGroup = composerMap.get(cKey);
      const pKey = entry.work.trim().toLowerCase();
      if (!cGroup.pieceMap.has(pKey)) {
        cGroup.pieceMap.set(pKey, { display: entry.work.trim(), entries: [] });
      }
      cGroup.pieceMap.get(pKey).entries.push(entry);
    }

    const composers = Array.from(composerMap.values()).map((c) => {
      const pieces = Array.from(c.pieceMap.values()).map((p) => {
        p.entries.sort((a, b) => {
          const aWhole = !a.movement, bWhole = !b.movement;
          if (aWhole !== bWhole) return aWhole ? -1 : 1;
          if (a.movement && b.movement) {
            const cmp = a.movement.localeCompare(b.movement, undefined, { numeric: true });
            if (cmp !== 0) return cmp;
          }
          return (b.createdAt || "").localeCompare(a.createdAt || "");
        });
        return p;
      });
      pieces.sort((a, b) => a.display.localeCompare(b.display));
      return { display: c.display, pieces };
    });
    composers.sort((a, b) => a.display.localeCompare(b.display));
    return composers;
  }

  /* ---------------------------------------------------------------
     Rendering: sidebar tree
  --------------------------------------------------------------- */
  function renderTree() {
    const tree = $("#tree");
    tree.innerHTML = "";
    const query = $("#search").value.trim();

    if (DATA.entries.length === 0) {
      const empty = document.createElement("div");
      empty.className = "tree-empty";
      const p = document.createElement("p");
      p.textContent = "Your library is empty. Add the first piece you've been listening to.";
      empty.appendChild(p);
      tree.appendChild(empty);
      return;
    }

    const groups = buildGroups(query);

    if (groups.length === 0) {
      const empty = document.createElement("div");
      empty.className = "tree-empty";
      const p = document.createElement("p");
      p.textContent = `No matches for "${query}".`;
      empty.appendChild(p);
      tree.appendChild(empty);
      return;
    }

    for (const composer of groups) {
      const cKey = composer.display.toLowerCase();
      const cGroupEl = document.createElement("div");
      cGroupEl.className = "composer-group" + (collapsedComposers.has(cKey) ? " collapsed" : "");

      const cHeader = document.createElement("div");
      cHeader.className = "composer-header";
      cHeader.tabIndex = 0;
      cHeader.setAttribute("role", "button");

      const disclosure = disclosureIcon();
      const name = document.createElement("span");
      name.className = "composer-name";
      name.textContent = composer.display;
      const count = document.createElement("span");
      count.className = "composer-count";
      const totalEntries = composer.pieces.reduce((n, p) => n + p.entries.length, 0);
      count.textContent = String(totalEntries);

      cHeader.append(disclosure, name, count);
      cHeader.addEventListener("click", () => {
        if (collapsedComposers.has(cKey)) collapsedComposers.delete(cKey);
        else collapsedComposers.add(cKey);
        renderTree();
      });
      cGroupEl.appendChild(cHeader);

      const pieceList = document.createElement("div");
      pieceList.className = "piece-list";

      for (const piece of composer.pieces) {
        const pKey = cKey + "||" + piece.display.toLowerCase();
        const pGroupEl = document.createElement("div");
        pGroupEl.className = "piece-group" + (collapsedPieces.has(pKey) ? " collapsed" : "");

        const pHeader = document.createElement("div");
        pHeader.className = "piece-header";
        pHeader.tabIndex = 0;
        pHeader.setAttribute("role", "button");

        const pDisclosure = disclosureIcon();
        const pTitle = document.createElement("span");
        pTitle.className = "piece-title";
        pTitle.textContent = piece.display;
        const pCount = document.createElement("span");
        pCount.className = "composer-count";
        pCount.textContent = String(piece.entries.length);

        pHeader.append(pDisclosure, pTitle, pCount);
        pHeader.addEventListener("click", () => {
          if (collapsedPieces.has(pKey)) collapsedPieces.delete(pKey);
          else collapsedPieces.add(pKey);
          renderTree();
        });
        pGroupEl.appendChild(pHeader);

        const entryList = document.createElement("div");
        entryList.className = "entry-list";

        for (const entry of piece.entries) {
          const row = document.createElement("div");
          row.className = "entry-row" + (entry.id === selectedEntryId ? " active" : "");
          row.tabIndex = 0;
          row.setAttribute("role", "button");

          const label = document.createElement("span");
          label.className = "mvt-label";
          label.textContent = entry.movement ? entry.movement : "Whole work";

          row.appendChild(label);
          row.appendChild(starRow(entry.rating));
          row.addEventListener("click", () => selectEntry(entry.id));

          entryList.appendChild(row);
        }

        pGroupEl.appendChild(entryList);
        pieceList.appendChild(pGroupEl);
      }

      cGroupEl.appendChild(pieceList);
      tree.appendChild(cGroupEl);
    }
  }

  function disclosureIcon() {
    const svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("class", "disclosure");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("fill", "none");
    svg.setAttribute("stroke", "currentColor");
    svg.setAttribute("stroke-width", "2.5");
    const path = document.createElementNS(SVGNS, "path");
    path.setAttribute("d", "M6 9l6 6 6-6");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("stroke-linejoin", "round");
    svg.appendChild(path);
    return svg;
  }

  /* ---------------------------------------------------------------
     Rendering: detail pane
  --------------------------------------------------------------- */
  function backButton() {
    const btn = document.createElement("button");
    btn.className = "btn btn-ghost back-btn";
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="btn-label">Library</span>`;
    btn.addEventListener("click", () => {
      $("#layout").classList.remove("showing-detail");
    });
    return btn;
  }

  function renderDetail() {
    const detail = $("#detail");
    detail.innerHTML = "";

    if (DATA.entries.length === 0) {
      const wrap = document.createElement("div");
      wrap.className = "detail-empty";
      const h2 = document.createElement("h2");
      h2.textContent = "Start your programme";
      const p = document.createElement("p");
      p.textContent = "Add the first work you've been listening to — composer, piece, and whatever movement you're on. Nothing is uploaded anywhere; it all stays in this browser until you export it.";
      const btn = document.createElement("button");
      btn.className = "btn btn-primary";
      btn.textContent = "Add your first entry";
      btn.addEventListener("click", () => openEntryModal());
      wrap.append(h2, p, btn);
      detail.appendChild(wrap);
      return;
    }

    const entry = DATA.entries.find((e) => e.id === selectedEntryId);

    if (!entry) {
      const wrap = document.createElement("div");
      wrap.className = "detail-empty";
      const h2 = document.createElement("h2");
      h2.textContent = "Nothing selected";
      const p = document.createElement("p");
      p.textContent = "Choose an entry from your library, or add a new one.";
      wrap.append(h2, p);
      detail.appendChild(wrap);
      return;
    }

    detail.appendChild(backButton());

    const eyebrow = document.createElement("div");
    eyebrow.className = "entry-eyebrow";
    eyebrow.textContent = entry.composer;
    detail.appendChild(eyebrow);

    const titleRow = document.createElement("div");
    titleRow.className = "entry-title-row";
    const work = document.createElement("h1");
    work.className = "entry-work";
    work.textContent = entry.work;
    titleRow.appendChild(work);

    const actions = document.createElement("div");
    actions.className = "entry-actions";
    const editBtn = document.createElement("button");
    editBtn.className = "btn btn-sm btn-ghost";
    editBtn.textContent = "Edit";
    editBtn.addEventListener("click", () => openEntryModal(entry));
    const dupBtn = document.createElement("button");
    dupBtn.className = "btn btn-sm btn-ghost";
    dupBtn.textContent = "Add another movement";
    dupBtn.title = "Add a new entry for the same composer and piece";
    dupBtn.addEventListener("click", () => openEntryModal(null, { composer: entry.composer, work: entry.work }));
    actions.append(dupBtn, editBtn);
    titleRow.appendChild(actions);
    detail.appendChild(titleRow);

    if (entry.movement) {
      const mvt = document.createElement("div");
      mvt.className = "entry-movement";
      mvt.textContent = entry.movement;
      detail.appendChild(mvt);
    }

    const metaRow = document.createElement("div");
    metaRow.className = "entry-meta-row";
    metaRow.appendChild(starRow(entry.rating, false));
    detail.appendChild(metaRow);

    if (entry.conductor || entry.recordingLink) {
      const sub = document.createElement("div");
      sub.className = "entry-sub";
      if (entry.conductor) {
        const strong = document.createElement("strong");
        strong.textContent = entry.conductor;
        sub.appendChild(strong);
      }
      if (entry.recordingLink) {
        if (entry.conductor) sub.appendChild(document.createTextNode("·"));
        if (isUrl(entry.recordingLink)) {
          const a = document.createElement("a");
          a.href = entry.recordingLink;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = "Recording ↗";
          sub.appendChild(a);
        } else {
          const span = document.createElement("span");
          span.textContent = entry.recordingLink;
          sub.appendChild(span);
        }
      }
      detail.appendChild(sub);
    }

    const divider = document.createElement("div");
    divider.className = "divider";
    detail.appendChild(divider);

    const notes = document.createElement("div");
    notes.className = "entry-notes";
    notes.textContent = entry.notes || "";
    detail.appendChild(notes);

    const siblings = DATA.entries.filter(
      (e) =>
        e.id !== entry.id &&
        e.composer.trim().toLowerCase() === entry.composer.trim().toLowerCase() &&
        e.work.trim().toLowerCase() === entry.work.trim().toLowerCase()
    );
    if (siblings.length > 0) {
      const section = document.createElement("div");
      section.className = "siblings-section";
      const label = document.createElement("div");
      label.className = "siblings-label";
      label.textContent = "Also in this work";
      section.appendChild(label);

      const pillWrap = document.createElement("div");
      pillWrap.className = "siblings-pills";

      siblings
        .sort((a, b) => (a.movement || "").localeCompare(b.movement || "", undefined, { numeric: true }))
        .forEach((sib) => {
          const pill = document.createElement("button");
          pill.className = "btn btn-sm btn-ghost";
          pill.textContent = sib.movement ? sib.movement : "Whole work";
          pill.addEventListener("click", () => selectEntry(sib.id));
          pillWrap.appendChild(pill);
        });

      section.appendChild(pillWrap);
      detail.appendChild(section);
    }
  }

  function selectEntry(id) {
    selectedEntryId = id;
    renderTree();
    renderDetail();
    if (window.matchMedia("(max-width: 820px)").matches) {
      $("#layout").classList.add("showing-detail");
    }
  }

  /* ---------------------------------------------------------------
     Add / edit modal
  --------------------------------------------------------------- */
  let ratingPickerValue = null;

  function buildRatingPicker() {
    const wrap = $("#rating-picker");
    wrap.innerHTML = "";
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.dataset.value = String(i);
      btn.setAttribute("aria-label", `${i} star${i === 1 ? "" : "s"}`);
      btn.appendChild(starIcon(false));
      btn.addEventListener("mouseenter", () => previewRating(i));
      btn.addEventListener("mouseleave", () => previewRating(ratingPickerValue || 0));
      btn.addEventListener("click", () => {
        ratingPickerValue = i;
        previewRating(i);
      });
      wrap.appendChild(btn);
    }
  }

  function previewRating(value) {
    const wrap = $("#rating-picker");
    Array.from(wrap.children).forEach((btn) => {
      const v = Number(btn.dataset.value);
      const old = btn.firstChild;
      btn.replaceChild(starIcon(v <= value), old);
    });
  }

  function setRatingPickerValue(value) {
    ratingPickerValue = value || null;
    previewRating(value || 0);
  }

  function refreshDatalists() {
    const composers = Array.from(new Set(DATA.entries.map((e) => e.composer.trim()))).sort((a, b) =>
      a.localeCompare(b)
    );
    const composerList = $("#composer-list");
    composerList.innerHTML = "";
    composers.forEach((c) => {
      const opt = document.createElement("option");
      opt.value = c;
      composerList.appendChild(opt);
    });
    updateWorkList();
  }

  function updateWorkList() {
    const composerVal = $("#entry-composer").value.trim().toLowerCase();
    const works = Array.from(
      new Set(
        DATA.entries
          .filter((e) => !composerVal || e.composer.trim().toLowerCase() === composerVal)
          .map((e) => e.work.trim())
      )
    ).sort((a, b) => a.localeCompare(b));
    const workList = $("#work-list");
    workList.innerHTML = "";
    works.forEach((w) => {
      const opt = document.createElement("option");
      opt.value = w;
      workList.appendChild(opt);
    });
  }

  function openEntryModal(entry = null, prefill = null) {
    $("#entry-form").reset();
    $("#entry-id").value = entry ? entry.id : "";
    $("#entry-composer").value = entry ? entry.composer : prefill ? prefill.composer : "";
    $("#entry-work").value = entry ? entry.work : prefill ? prefill.work : "";
    $("#entry-movement").value = entry ? entry.movement || "" : "";
    $("#entry-conductor").value = entry ? entry.conductor || "" : "";
    $("#entry-recording").value = entry ? entry.recordingLink || "" : "";
    $("#entry-notes").value = entry ? entry.notes || "" : "";
    setRatingPickerValue(entry ? entry.rating : null);
    $("#entry-modal-title").textContent = entry ? "Edit entry" : "New listening entry";
    $("#entry-delete").style.display = entry ? "inline-flex" : "none";
    refreshDatalists();
    $("#entry-modal-backdrop").classList.remove("visually-hidden");
    setTimeout(() => $("#entry-composer").focus(), 0);
  }

  function closeEntryModal() {
    $("#entry-modal-backdrop").classList.add("visually-hidden");
  }

  $("#entry-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const composer = $("#entry-composer").value.trim();
    const work = $("#entry-work").value.trim();
    const movement = $("#entry-movement").value.trim();
    const conductor = $("#entry-conductor").value.trim();
    const recordingLink = $("#entry-recording").value.trim();
    const notes = $("#entry-notes").value;

    if (!composer || !work) return;
    if (!ratingPickerValue) {
      showToast("Choose a star rating.");
      return;
    }

    const id = $("#entry-id").value;
    const now = new Date().toISOString();

    if (id) {
      const idx = DATA.entries.findIndex((e) => e.id === id);
      if (idx !== -1) {
        DATA.entries[idx] = {
          ...DATA.entries[idx],
          composer,
          work,
          movement,
          conductor,
          recordingLink,
          rating: ratingPickerValue,
          notes,
          updatedAt: now,
        };
        selectedEntryId = id;
      }
    } else {
      const newEntry = {
        id: uid(),
        composer,
        work,
        movement,
        conductor,
        recordingLink,
        rating: ratingPickerValue,
        notes,
        createdAt: now,
        updatedAt: now,
      };
      DATA.entries.push(newEntry);
      selectedEntryId = newEntry.id;
    }

    saveData();
    closeEntryModal();
    renderTree();
    renderDetail();
    showToast("Entry saved.");
  });

  $("#entry-cancel").addEventListener("click", closeEntryModal);
  $("#entry-modal-close").addEventListener("click", closeEntryModal);
  $("#entry-modal-backdrop").addEventListener("click", (e) => {
    if (e.target === $("#entry-modal-backdrop")) closeEntryModal();
  });
  $("#entry-composer").addEventListener("input", updateWorkList);

  $("#entry-delete").addEventListener("click", () => {
    const id = $("#entry-id").value;
    if (!id) return;
    if (!confirm("Delete this entry? This can't be undone.")) return;
    DATA.entries = DATA.entries.filter((e) => e.id !== id);
    if (selectedEntryId === id) selectedEntryId = null;
    saveData();
    closeEntryModal();
    renderTree();
    renderDetail();
    showToast("Entry deleted.");
  });

  $("#btn-add").addEventListener("click", () => {
    const current = DATA.entries.find((e) => e.id === selectedEntryId);
    openEntryModal(null, current ? { composer: current.composer, work: current.work } : null);
  });

  /* ---------------------------------------------------------------
     Import / export
  --------------------------------------------------------------- */
  function exportBackup() {
    const payload = {
      schema: "programme-notes",
      version: 1,
      exportedAt: new Date().toISOString(),
      entries: DATA.entries,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `programme-notes-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast("Backup downloaded.");
  }

  function validateImported(json) {
    if (Array.isArray(json)) return json;
    if (json && Array.isArray(json.entries)) return json.entries;
    return null;
  }

  function openImportModal(entries) {
    pendingImportEntries = entries;
    $("#import-summary").textContent = `Found ${entries.length} ${
      entries.length === 1 ? "entry" : "entries"
    } in this file. How would you like to bring it in?`;
    $("#import-modal-backdrop").classList.remove("visually-hidden");
  }

  function closeImportModal() {
    $("#import-modal-backdrop").classList.add("visually-hidden");
    pendingImportEntries = null;
  }

  $("#btn-export").addEventListener("click", exportBackup);
  $("#btn-import").addEventListener("click", () => $("#file-import").click());

  $("#file-import").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const json = JSON.parse(reader.result);
        const entries = validateImported(json);
        if (!entries) {
          showToast("That file doesn't look like a Programme Notes backup.");
          return;
        }
        openImportModal(entries);
      } catch (err) {
        console.error(err);
        showToast("Couldn't read that file — is it valid JSON?");
      } finally {
        e.target.value = "";
      }
    };
    reader.readAsText(file);
  });

  $("#import-merge").addEventListener("click", () => {
    if (!pendingImportEntries) return;
    const byId = new Map(DATA.entries.map((e) => [e.id, e]));
    let added = 0,
      updated = 0;
    for (const entry of pendingImportEntries) {
      if (!entry || !entry.id) continue;
      if (byId.has(entry.id)) updated++;
      else added++;
      byId.set(entry.id, entry);
    }
    DATA.entries = Array.from(byId.values());
    saveData();
    closeImportModal();
    renderTree();
    renderDetail();
    showToast(`Merged: ${added} added, ${updated} updated.`);
  });

  $("#import-replace").addEventListener("click", () => {
    if (!pendingImportEntries) return;
    if (!confirm("This replaces everything currently stored in this browser. Continue?")) return;
    DATA.entries = pendingImportEntries;
    selectedEntryId = null;
    saveData();
    closeImportModal();
    renderTree();
    renderDetail();
    showToast("Library replaced from backup.");
  });

  $("#import-modal-close").addEventListener("click", closeImportModal);
  $("#import-modal-backdrop").addEventListener("click", (e) => {
    if (e.target === $("#import-modal-backdrop")) closeImportModal();
  });

  /* ---------------------------------------------------------------
     Misc: search, toast, escape key, service worker
  --------------------------------------------------------------- */
  $("#search").addEventListener("input", renderTree);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeEntryModal();
      closeImportModal();
    }
  });

  let toastTimer = null;
  function showToast(message) {
    const toast = $("#toast");
    toast.textContent = message;
    toast.classList.remove("visually-hidden");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.add("visually-hidden"), 2800);
  }

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.warn("Service worker registration failed:", err);
      });
    });
  }

  /* ---------------------------------------------------------------
     Init
  --------------------------------------------------------------- */
  buildRatingPicker();
  refreshDatalists();
  renderTree();
  renderDetail();
})();

</script>
</body>
</html>
